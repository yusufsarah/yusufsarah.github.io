<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sarah ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e7,#f6e7ff,#ffffff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{
background:white;
padding:40px;
border-radius:25px;
text-align:center;
max-width:650px;
box-shadow:0 20px 50px rgba(0,0,0,.15);
z-index:10;
}

h1{
color:#ff4f8b;
font-size:42px;
margin-bottom:15px;
}

p{
font-size:20px;
line-height:1.8;
color:#555;
}

button{
margin-top:25px;
padding:15px 35px;
font-size:18px;
border:none;
border-radius:40px;
background:#ff4f8b;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

#letter{
display:none;
margin-top:25px;
}

.heart{
position:absolute;
color:#ff4f8b;
animation:float 8s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
100%{
transform:translateY(-120vh);
opacity:1;
}
}
</style>

</head>

<body>

<div class="card">

<h1>For Sarah 💖</h1>

<p>
I made this little surprise just for you.
</p>

<button onclick="openLetter()">
Open My Heart ❤️
</button>

<div id="letter">
 <h2 style="color:#ff4f8b;">Dear Sarah ❤️</h2>

<p id="typing"></p>

<p style="margin-top:25px;font-size:26px;color:#ff4f8b;font-weight:bold;">
I Love You Today,
Tomorrow,
And Forever.
</p>

<p style="margin-top:25px;font-size:20px;">
— Yusuf 💖
</p>

</div>

</div>

<script>

function openLetter(){

document.getElementById("letter").style.display="block";

}

const text=`Dear Sarah,

You are the best thing that ever happened to me.

Every smile of yours makes my day brighter.

Thank you for being part of my life.

I hope this little surprise makes you smile.

I love you more than words can ever describe.

Forever yours,

Yusuf ❤️`;

let i=0;

function type(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

i++;

setTimeout(type,45);

}

}

openLetter=()=>{

document.getElementById("letter").style.display="block";

type();

}

for(let i=0;i<70;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(15+Math.random()*25)+"px";

h.style.animationDelay=Math.random()*8+"s";

document.body.appendChild(h);

}

</script>

</body>
</html>
